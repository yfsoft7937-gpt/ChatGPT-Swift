<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ChatGPT Swift</title>
  <style>
    body {
      font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      width: 340px;
      color: #e5e7eb;
      background: #0f172a;
    }
    main { padding: 14px; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    p { margin: 0 0 12px; color: #cbd5e1; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      gap: 12px;
    }
    .row:first-of-type { border-top: none; }
    label { font-weight: 600; }
    input[type="number"] {
      width: 72px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.5);
      color: #fff;
    }
    input[type="checkbox"] { transform: scale(1.1); }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    button, a {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(30, 41, 59, 0.75);
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      text-decoration: none;
      cursor: pointer;
      font: inherit;
    }
    small { color: #94a3b8; display: block; margin-top: 10px; }
  </style>
</head>
<body>
  <main>
    <h1>ChatGPT Swift</h1>
    <p>Window old messages safely, auto-restore nearby history, and keep long chats smoother.</p>

    <div class="row">
      <label for="enabled">Enabled</label>
      <input id="enabled" type="checkbox">
    </div>
    <div class="row">
      <label for="contentVisibilityOnly">Safe mode</label>
      <input id="contentVisibilityOnly" type="checkbox">
    </div>
    <div class="row">
      <label for="aggressiveMode">Aggressive</label>
      <input id="aggressiveMode" type="checkbox">
    </div>
    <div class="row">
      <label for="autoRestoreNearViewport">Auto restore nearby</label>
      <input id="autoRestoreNearViewport" type="checkbox">
    </div>
    <div class="row">
      <label for="debugOverlay">Debug overlay</label>
      <input id="debugOverlay" type="checkbox">
    </div>
    <div class="row">
      <label for="minMessagesForVirtualization">Min messages</label>
      <input id="minMessagesForVirtualization" type="number" min="10" max="500">
    </div>
    <div class="row">
      <label for="overscanMessages">Overscan</label>
      <input id="overscanMessages" type="number" min="2" max="50">
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <a href="options.html" target="_blank" rel="noreferrer">More settings</a>
    </div>
    <small>Reload the ChatGPT tab if a session was already open before installing.</small>
  </main>
  <script src="popup.js"></script>
</body>
</html>
